<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Premium Fonts: Outfit & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Flaticon Uicons -->
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    
    <title>Lumina - AI App Builder</title>
  </head>
  <body>
    <!-- Animated background layers -->
    <div class="bg-animated"></div>
    <div class="bg-texture"></div>

    <div class="app-container">
      <nav class="navbar glass-panel">
        <div class="logo">
          <i class="fi fi-rr-magic-wand logo-icon"></i>
          <span>Lumina</span>
        </div>
        <div class="nav-actions">
          <select id="model-select" class="nav-dropdown">
            <option value="accounts/fireworks/models/deepseek-v4-pro">DeepSeek v4 Pro (Smart)</option>
            <option value="accounts/fireworks/models/kimi-k2p6">Kimi K2.6 (Fast)</option>
            <option value="accounts/fireworks/models/gpt-oss-120b">GPT-OSS 120B (Powerful)</option>
          </select>
          <button class="btn btn-icon" id="btn-history"><i class="fi fi-rr-time-past"></i></button>
          <button class="btn btn-icon" id="btn-settings"><i class="fi fi-rr-settings"></i></button>
          <button class="btn btn-primary" id="btn-deploy">
            <i class="fi fi-rr-rocket"></i> Deploy
          </button>
        </div>
      </nav>
      
      <main class="workspace">
        <!-- Chat Panel -->
        <section class="panel chat-panel glass-panel">
          <div class="panel-header">
            <div class="panel-title"><i class="fi fi-rr-comment-alt"></i> AI Assistant</div>
          </div>
          <div class="chat-history" id="chat-history">
            <div class="message ai-message">
              <div class="avatar"><i class="fi fi-rr-magic-wand"></i></div>
              <div class="message-content">Hello! I'm Lumina. Let's design something incredible today. Describe what you'd like to build.</div>
            </div>
          </div>
          <div class="chat-input-container">
            <div id="image-preview-container" class="hidden thumbnail-container">
              <img id="image-thumbnail" src="" class="image-thumbnail" />
              <button id="btn-remove-image" class="btn-remove-image">x</button>
            </div>
            <div class="input-wrapper">
              <input type="file" id="image-upload" accept="image/*" class="hidden">
              <button id="btn-upload" class="btn-icon text-slate-400 hover:text-white px-3"><i class="fi fi-rr-picture"></i></button>
              <textarea id="prompt-input" placeholder="e.g. Create a sleek dark-mode pricing table..." rows="2"></textarea>
              <button id="send-btn" class="btn-send"><i class="fi fi-rr-paper-plane"></i></button>
            </div>
            <div class="input-footer">
              <span id="amd-metrics" class="metrics-chip"><i class="fi fi-rr-dashboard"></i> AMD GPU: Idle</span>
              <span>Tokens: 0 / 8k</span>
            </div>
          </div>
        </section>
        
        <!-- Preview Panel -->
        <section class="panel preview-panel glass-panel">
          <div class="preview-header">
            <div class="tabs">
              <button class="tab active" data-target="preview"><i class="fi fi-rr-eye"></i> Preview</button>
              <button class="tab" data-target="code"><i class="fi fi-rr-code-branch"></i> Code</button>
            </div>
            <div class="preview-actions">
               <button class="btn btn-icon-small" id="btn-magic-edit" title="Magic Edit Mode"><i class="fi fi-rr-magic-wand"></i></button>
               <button class="btn btn-icon-small" id="btn-refresh"><i class="fi fi-rr-refresh"></i></button>
               <button class="btn btn-icon-small" id="btn-expand"><i class="fi fi-rr-expand"></i></button>
               <button class="btn btn-primary hidden" id="btn-compress" style="padding: 4px 12px; font-size: 0.8rem; margin-left: 8px;"><i class="fi fi-rr-angle-left"></i> Back to Workspace</button>
            </div>
          </div>
          <div class="preview-content">
            <iframe id="preview-iframe" title="Live Preview"></iframe>
            <div id="code-view" class="hidden" style="position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(10,10,15,0.95); padding: 32px; overflow: auto; display: flex; flex-direction: column;">
              <div class="export-toolbar" style="position: absolute; top: 12px; right: 24px; display: flex; gap: 8px; z-index: 10;">
                 <button class="btn" id="btn-export-react" style="background: rgba(255,255,255,0.1); color: white; padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; border: 1px solid var(--panel-border);">⚛️ React</button>
                 <button class="btn" id="btn-export-vue" style="background: rgba(255,255,255,0.1); color: white; padding: 4px 10px; font-size: 0.8rem; border-radius: 4px; border: 1px solid var(--panel-border);">🟩 Vue</button>
              </div>
              <pre style="margin-top: 24px;"><code id="code-block"></code></pre>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
      <i class="fi fi-rr-info"></i>
      <span id="toast-message">Message</span>
    </div>

    <!-- Magic Edit Overlay -->
    <div id="magic-edit-overlay" class="hidden" style="position: fixed; z-index: 9999; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border: 1px solid #ec4899; border-radius: 12px; padding: 16px; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 12px; opacity: 0; pointer-events: none; transition: opacity 0.2s;">
      <div style="font-size: 0.9rem; font-weight: 600; color: white; display: flex; align-items: center; justify-content: space-between;">
        <span><i class="fi fi-rr-magic-wand" style="color: #ec4899; margin-right: 6px;"></i> Magic Edit</span>
        <button id="btn-close-magic" style="background: transparent; border: none; color: #94a3b8; cursor: pointer;"><i class="fi fi-rr-cross-small"></i></button>
      </div>
      <textarea id="magic-edit-input" placeholder="e.g. Make this button red" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px; color: white; font-size: 0.85rem; resize: none; height: 60px;"></textarea>
      <button id="btn-submit-magic" class="btn btn-primary" style="padding: 6px; font-size: 0.85rem; width: 100%; background: linear-gradient(135deg, #ec4899, #f43f5e);">Update Element</button>
    </div>

    <!-- Settings Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal glass-panel" id="settings-modal">
        <div class="modal-header">
          <span style="display: flex; align-items: center; gap: 8px;"><i class="fi fi-rr-settings"></i> Settings</span>
          <button class="btn-icon-small" id="btn-close-modal"><i class="fi fi-rr-cross-small"></i></button>
        </div>
        <div class="modal-body">
          <label>Fireworks AI API Key</label>
          <input type="password" placeholder="fw-xxxxxxxxxxxxxxxx" class="modal-input">
          <label>System Prompt</label>
          <textarea rows="3" class="modal-input" id="system-prompt-input" placeholder="You are an expert UI developer..."></textarea>
          <label>AMD Cloud Deploy URL</label>
          <input type="text" id="deploy-url-input" placeholder="http://localhost:3001/deploy" value="http://localhost:3001/deploy" class="modal-input">
          <button class="btn btn-primary" style="width:100%; margin-top: 10px;" id="btn-save-settings">Save Settings</button>
        </div>
      </div>
      
      <!-- History Modal -->
      <div class="modal glass-panel hidden" id="history-modal" style="width: 500px; max-height: 80vh;">
        <div class="modal-header">
          <span style="display: flex; align-items: center; gap: 8px;"><i class="fi fi-rr-time-past"></i> Generation History</span>
          <button class="btn-icon-small" id="btn-close-history"><i class="fi fi-rr-cross-small"></i></button>
        </div>
        <div class="modal-body" style="overflow-y: auto; max-height: calc(80vh - 80px);">
          <div id="history-list" style="display: flex; flex-direction: column; gap: 12px;">
            <p class="text-slate-400 text-sm text-center">No history found.</p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
